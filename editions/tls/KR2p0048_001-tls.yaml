body:
  text: 君子之立孝愛是用禮是貴故爲人君者言人之君之不能使其臣者不與言人之臣之不能事其君者故爲人臣者言人之臣之不能事其君者不與言人之君之不能使其臣者故爲人父者言人之父之不能畜子者不與言人之子之不孝者故爲人子者言人之子之不孝者不與言人之父之不能畜子者故爲人兄者言人之兄之不能慈弟者不與言人之弟之不能承兄者故爲人弟者言人之弟之不能承兄者不與言人之兄之不能慈弟者故曰與君言言使臣與臣言言事君與父言言畜子與子言言孝父與兄言言慈弟與弟言言承兄反此亂也君子事父母無私樂無私憂父母所樂樂之父母所憂憂之善則從之不善則止之止之而不可陰而任不可雖至於死從之孝而不諫不成孝諫而不從亦不成孝君子孝子不負匿在腹中巧變故父毋安之如從己起君子曰孝子父母有疾冠不綰行不容不萃立不庶語時昧攻禜行祝於五祀豈必有益君子以成其孝是謂君子君子曰孝子事父母以食惡美下之君子曰悌民之經也在小不爭在大不亂故爲少必聽長之命爲賤必聽貴之命從人勸則免於戾
